# TEMPLATE ONLY — STAGING SMOKE-TEST WORKFLOW SKELETON (NON-PRODUCTION)
# Template-only / do_not_deploy workflow. Do not deploy to production or schedule.
# Approved staging smoke-test execution is permitted only under development_structural_test
# controls and documented MAG/staging approval (see docs/workflow_execution_runbook.md).
# This is not production readiness or final parity.
#
# NOTE: Canonical split job package is mifid_phase1_staging_jobs.yml (Jobs 1–11).
# This file retains a single-workflow backward reference for readiness + critical-path checks.
# Prefer split jobs run manually one-by-one:
#   Job 1 first, then Jobs 2–8, then Job 11; Jobs 9–10 are optional.
# Notebook companion path: mifid_phase1_staging_notebook_jobs.yml (wrapper notebooks).
# See docs/staging_workflow_job_creation_plan.md.
#
# Scope:
# - Ext/staging/audit table structural smoke tests in main.regtech_ops_stg only
# - Read sources from main.regtech when DE-migrated; catalog-scoped information_schema
# - No system.information_schema (INSUFFICIENT_PERMISSIONS in some environments)
# - No writes to main.regtech; no delivery/upload/response; no production schedules
# - run_mode default: development_structural_test; dry_run default: true
#
# Default critical path:
#   readiness (04→gate→01→02→03) → static_reference → price/currency/split → non_price_reg_ext
#   → regulation_movement → hedge_liquidity_ext → asic2_structural
#   → mifid2_ext_non_pii → validation_summary
#
# Optional groups (NOT in default path — use mifid_phase1_staging_jobs.yml Jobs 9–10):
# - manual seed: mifid_staging_manual_seed_testing_job_do_not_deploy
# - hedge recordid: mifid_staging_hedge_recordid_registry_job_do_not_deploy
# - masked customer: enable_masked_customer_structural_tests (commented block below)
#
# Explicitly DISABLED / GATED:
# - final MIFID2_NPD_TRAX / MIFID2_Failed_TRAX (MAG-10; final-flow last)
# - final Hedge report (MAG-12/MAG-13; RecordID registry)
# - final PII customer parity (MAG-06)
# - delivery / upload / response / production deployment
#
# Parameter defaults: databricks/config/workflow_parameters.yml

bundle:
  name: mifid_phase1_staging_smoke_test_skeleton

variables:
  sql_warehouse_id:
    description: Placeholder SQL warehouse ID for future execution enablement
    default: "REPLACE_WITH_SQL_WAREHOUSE_ID"

resources:
  jobs:
    mifid_phase1_staging_smoke_test_skeleton:
      name: mifid_phase1_staging_smoke_test_skeleton_do_not_deploy
      description: >
        Combined staging smoke-test workflow skeleton (readiness + ext validation).
        Template-only, no schedule. Prefer split jobs in mifid_phase1_staging_jobs.yml.
        Writes target main.regtech_ops_stg with bi_output_regtechops_ prefix only.
      max_concurrent_runs: 1
      tags:
        phase: staging_smoke_test
        state: template_only_execution_gated
        environment: regtech_ops_stg
        delivery_scope: excluded
        production_scope: excluded
        superseded_by: mifid_phase1_staging_jobs.yml
      parameters:
        - name: source_catalog
          default: "main"
        - name: source_schema
          default: "regtech"
        - name: target_catalog
          default: "main"
        - name: target_schema
          default: "regtech_ops_stg"
        - name: catalog
          default: "main"
        - name: schema
          default: "regtech_ops_stg"
        - name: object_prefix
          default: "bi_output_regtechops_"
        - name: report_date
          default: "YYYY-MM-DD"
        - name: run_mode
          default: "development_structural_test"
        - name: dry_run
          default: "true"
        - name: staging_execution_approved
          default: "false"
        - name: allow_masked_customer_sources
          default: "false"
        - name: enable_masked_customer_structural_tests
          default: "false"
        - name: enable_manual_seed_testing_checks
          default: "false"
        - name: require_unmasked_pii_for_parity
          default: "true"
        - name: skip_delivery_steps
          default: "true"
        - name: enable_validation_only
          default: "true"
        - name: dev_customer_source_mode
          default: "masked_fallback"
        - name: customer_source_policy
          default: "temporary_masked_dev_only_v1"
        - name: sql_warehouse_id
          default: "REPLACE_WITH_SQL_WAREHOUSE_ID"
        - name: git_branch
          default: "REPLACE_WITH_BRANCH_NAME"
      tasks:
        # --- Readiness chain (same as Job 1 in mifid_phase1_staging_jobs.yml) ---
        - task_key: target_schema_safety_checks
          description: >
            Readiness step 1 — target safety. SQL: 12_staging_readiness/04_*.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/12_staging_readiness/04_target_schema_safety_checks.sql

        - task_key: global_scope_gate
          depends_on:
            - task_key: target_schema_safety_checks
          description: >
            Readiness step 2 — GATE-01–08. SQL: gates/gate_global_scope.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/10_workflow/gates/gate_global_scope.sql

        - task_key: source_table_existence_checks
          depends_on:
            - task_key: global_scope_gate
          description: >
            Readiness step 3 — catalog-scoped table existence. SQL: 12_staging_readiness/01_*.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/12_staging_readiness/01_source_table_existence_checks.sql

        - task_key: required_column_checks
          depends_on:
            - task_key: source_table_existence_checks
          description: >
            Readiness step 4 — required columns. SQL: 12_staging_readiness/02_*.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/12_staging_readiness/02_required_column_checks.sql

        - task_key: row_count_date_range_checks
          depends_on:
            - task_key: required_column_checks
          description: >
            Readiness step 5 — RUN_MANUAL row/date guidance. SQL: 12_staging_readiness/03_*.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/12_staging_readiness/03_row_count_date_range_checks.sql

        # --- Ext/staging groups (same as Job 2 in mifid_phase1_staging_jobs.yml) ---
        - task_key: static_reference_checks
          depends_on:
            - task_key: row_count_date_range_checks
          description: >
            Static reference validation. SQL: validation/02_static_reference_required_columns.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/validation/02_static_reference_required_columns.sql

        - task_key: price_currency_split_ext_staging
          depends_on:
            - task_key: static_reference_checks
          description: >
            Price/currency/split validation. SQL: 03_pre_regulation_ext/03_price_currency_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/03_price_currency_validation.sql

        - task_key: non_price_reg_ext_staging
          depends_on:
            - task_key: price_currency_split_ext_staging
          description: >
            Non-price Reg_Ext validation. SQL: 03_pre_regulation_ext/06_non_price_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/06_non_price_validation.sql

        - task_key: regulation_movement_staging
          depends_on:
            - task_key: non_price_reg_ext_staging
          description: >
            Regulation movement validation. SQL: 04_regulation_movements/03_regulation_movments_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/04_regulation_movements/03_regulation_movments_validation.sql

        - task_key: hedge_liquidity_ext_staging
          depends_on:
            - task_key: regulation_movement_staging
          description: >
            Hedge/liquidity ext validation. SQL: 05_hedge_liquidity/04_hedge_liquidity_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/05_hedge_liquidity/04_hedge_liquidity_validation.sql

        - task_key: asic2_structural_staging
          depends_on:
            - task_key: hedge_liquidity_ext_staging
          description: >
            ASIC2 structural validation. SQL: 06_asic2_subset/06_asic2_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/06_asic2_subset/06_asic2_validation.sql

        - task_key: mifid2_ext_non_pii_staging
          depends_on:
            - task_key: asic2_structural_staging
          description: >
            MIFID2_ext non-PII validation. EXCLUDED: 06_failed_trax_staging.sql
            SQL: 07_mifid2_ext/07_mifid2_ext_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/07_mifid2_ext/07_mifid2_ext_validation.sql

        - task_key: validation_summary
          depends_on:
            - task_key: mifid2_ext_non_pii_staging
          description: >
            Cross-module readiness gate (primary). SQL: gates/gate_cross_module_readiness.sql.
            Supporting: 09_validation/07_phase1_readiness_summary.sql (optional manual).
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/10_workflow/gates/gate_cross_module_readiness.sql

        # -------------------------------------------------------------------------
        # OPTIONAL — masked customer (not default). Uncomment when MAG-05 closed.
        # - task_key: masked_customer_structural_tests
        #   depends_on:
        #     - task_key: mifid2_ext_non_pii_staging
        #   description: OPTIONAL masked customer structural tests.
        #   sql_task:
        #     warehouse_id: ${var.sql_warehouse_id}
        #     file:
        #       path: ../sql/10_workflow/gates/gate_module_validation_chain.sql
        #
        # Optional seed and RecordID jobs: use mifid_phase1_staging_jobs.yml Jobs 9–10.
        # -------------------------------------------------------------------------
