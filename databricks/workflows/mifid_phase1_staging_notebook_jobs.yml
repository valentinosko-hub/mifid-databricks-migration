      tags:
        phase: notebook_staging_price_currency_split
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "3"
        prerequisite_job: mifid_notebook_staging_static_reference_job_do_not_deploy
      parameters: *staging_notebook_parameters
      tasks:
        - task_key: notebook_price_currency_split_staging
          notebook_task:
