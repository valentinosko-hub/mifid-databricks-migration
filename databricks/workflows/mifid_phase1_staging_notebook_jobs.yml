# TEMPLATE ONLY — STAGING NOTEBOOK WORKFLOW JOBS (NON-PRODUCTION)
# Companion notebook wrappers for controlled staging execution support.
# Do not deploy to production or schedule. Not production-grade.
#
# Source-of-truth policy:
# - Repository/Cursor-authored YAML + notebooks + docs are authoritative.
# - Copy accepted Databricks UI/Genie edits back to repo and commit (avoid drift).
#
# Scope boundaries:
# - Read defaults: main.regtech (DE-migrated sources)
# - Write target: main.regtech_ops_stg only
# - Generated prefix: bi_output_regtechops_
# - No writes to main.regtech
# - No delivery/upload/response/production logic

bundle:
  name: mifid_phase1_staging_notebook_jobs

variables:
  sql_warehouse_id:
    description: Placeholder SQL warehouse ID for future execution enablement
    default: "REPLACE_WITH_SQL_WAREHOUSE_ID"

resources:
  jobs:
    # -------------------------------------------------------------------------
    # Job 1 — Notebook readiness first
    # -------------------------------------------------------------------------
    mifid_notebook_staging_readiness_job:
      name: mifid_notebook_staging_readiness_job_do_not_deploy
      max_concurrent_runs: 1
      tags:
        phase: notebook_staging_readiness
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "1"
        production_scope: excluded
      parameters: &staging_notebook_parameters
        - name: source_catalog
          default: "main"
        - name: source_schema
          default: "regtech"
        - name: target_catalog
          default: "main"
        - name: target_schema
          default: "regtech_ops_stg"
        - name: object_prefix
          default: "bi_output_regtechops_"
        - name: report_date
          default: "YYYY-MM-DD"
        - name: run_mode
          default: "development_structural_test"
        - name: dry_run
          default: "true"
        - name: skip_delivery_steps
          default: "true"
        - name: allow_masked_customer_sources
          default: "false"
        - name: require_unmasked_pii_for_parity
          default: "true"
        - name: enable_manual_seed_testing_checks
          default: "false"
        - name: enable_masked_customer_structural_tests
          default: "false"
        - name: staging_execution_approved
          default: "false"
      tasks:
        - task_key: notebook_readiness_checks
          notebook_task:
            notebook_path: ../notebooks/mifid_staging/01_readiness_checks.py
            source: WORKSPACE

    # -------------------------------------------------------------------------
    # Job 2 — Notebook static/reference checks
    # -------------------------------------------------------------------------
    mifid_notebook_staging_static_reference_job:
      name: mifid_notebook_staging_static_reference_job_do_not_deploy
      max_concurrent_runs: 1
      tags:
        phase: notebook_staging_static_reference
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "2"
        prerequisite_job: mifid_notebook_staging_readiness_job_do_not_deploy
      parameters: *staging_notebook_parameters
      tasks:
        - task_key: notebook_static_reference_checks
          notebook_task:
            notebook_path: ../notebooks/mifid_staging/02_static_reference_checks.py
            source: WORKSPACE

    # -------------------------------------------------------------------------
    # Job 3 — Notebook price/currency/split
    # -------------------------------------------------------------------------
    mifid_notebook_staging_price_currency_split_job:
      name: mifid_notebook_staging_price_currency_split_job_do_not_deploy
