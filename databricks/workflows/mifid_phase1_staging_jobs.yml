# TEMPLATE ONLY — STAGING WORKFLOW JOBS (NON-PRODUCTION)
# Template-only / do_not_deploy workflow definitions. Do not deploy to production or schedule.
# Approved staging smoke-test execution is permitted only under development_structural_test
# controls and documented MAG/staging approval (see docs/workflow_execution_runbook.md).
# This is not production readiness or final parity.
#
# Canonical split SQL-task staging job package. See docs/staging_workflow_job_creation_plan.md.
# Notebook companion package: databricks/workflows/mifid_phase1_staging_notebook_jobs.yml
#
# Execution order (manual one-by-one — no automatic Databricks cross-job triggers in this skeleton):
#   1. mifid_staging_readiness_job_do_not_deploy (always first)
#   2. mifid_staging_static_reference_job_do_not_deploy
#   3. mifid_staging_price_currency_split_job_do_not_deploy
#   4. mifid_staging_non_price_reg_ext_job_do_not_deploy
#   5. mifid_staging_regulation_movement_job_do_not_deploy
#   6. mifid_staging_hedge_liquidity_job_do_not_deploy
#   7. mifid_staging_asic2_structural_job_do_not_deploy
#   8. mifid_staging_mifid2_ext_non_pii_job_do_not_deploy
#   9. mifid_staging_manual_seed_testing_job_do_not_deploy (optional)
#  10. mifid_staging_hedge_recordid_registry_job_do_not_deploy (optional; after Hedge seed/history)
#  11. mifid_staging_validation_summary_job_do_not_deploy
#
# Environment policy:
# - Read: main.regtech (catalog-scoped information_schema; not system.information_schema)
# - Write: main.regtech_ops_stg only; prefix bi_output_regtechops_
# - dry_run default true; skip_delivery_steps true; no schedule; no production deployment
#
# Explicitly EXCLUDED from all jobs:
# - final MIFID2_NPD_TRAX / MIFID2_Failed_TRAX activation
# - final MIFID2_Hedge_Report activation
# - final customer/NPD parity (main.pii_data)
# - delivery / upload / response / production schedules
# - writes to main.regtech
#
# Parameter defaults: databricks/config/workflow_parameters.yml

bundle:
  name: mifid_phase1_staging_jobs

variables:
  sql_warehouse_id:
    description: Placeholder SQL warehouse ID for future execution enablement
    default: "REPLACE_WITH_SQL_WAREHOUSE_ID"

resources:
  jobs:
    # -------------------------------------------------------------------------
    # Job 1 — Readiness (run first)
    # -------------------------------------------------------------------------
    mifid_staging_readiness_job:
      name: mifid_staging_readiness_job_do_not_deploy
      description: >
        Staging readiness checks before any ext/staging table-generation task.
        Uses catalog-scoped information_schema (12_staging_readiness). Stop on FAIL/BLOCK.
        If information_schema permissions block automated checks, run equivalent manual inline
        checks and record evidence externally. TODO/SKIP/RUN_MANUAL rows require review
        before proceeding to Job 2.
      max_concurrent_runs: 1
      tags:
        phase: staging_readiness
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "1"
        delivery_scope: excluded
        production_scope: excluded
      # YAML anchor for shared parameters (Jobs 2–11 reference *staging_job_parameters).
      # Run `databricks bundle validate` to confirm anchor expansion before any future deployment.
      # If anchor expansion fails, inline duplicate parameter blocks per job (low-risk fallback).
      parameters: &staging_job_parameters
        - name: source_catalog
          default: "main"
        - name: source_schema
          default: "regtech"
        - name: target_catalog
          default: "main"
        - name: target_schema
          default: "regtech_ops_stg"
        - name: catalog
          default: "main"
        - name: schema
          default: "regtech_ops_stg"
        - name: object_prefix
          default: "bi_output_regtechops_"
        - name: report_date
          default: "YYYY-MM-DD"
        - name: run_mode
          default: "development_structural_test"
        - name: dry_run
          default: "true"
        - name: staging_execution_approved
          default: "false"
        - name: skip_delivery_steps
          default: "true"
        - name: allow_masked_customer_sources
          default: "false"
        - name: require_unmasked_pii_for_parity
          default: "true"
        - name: enable_manual_seed_testing_checks
          default: "false"
        - name: enable_masked_customer_structural_tests
          default: "false"
        - name: enable_validation_only
          default: "true"
        - name: dev_customer_source_mode
          default: "masked_fallback"
        - name: customer_source_policy
          default: "temporary_masked_dev_only_v1"
        - name: sql_warehouse_id
          default: "REPLACE_WITH_SQL_WAREHOUSE_ID"
        - name: git_branch
          default: "REPLACE_WITH_BRANCH_NAME"
      tasks:
        - task_key: target_schema_safety_checks
          description: >
            Target policy — main.regtech_ops_stg write only; skip_delivery_steps=true.
            Catalog-scoped metadata: {{target_catalog}}.information_schema.schemata.
            SQL: databricks/sql/12_staging_readiness/04_target_schema_safety_checks.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/12_staging_readiness/04_target_schema_safety_checks.sql

        - task_key: global_scope_gate
          depends_on:
            - task_key: target_schema_safety_checks
          description: >
            Global scope gate GATE-01–08. Stop on BLOCK.
            SQL: databricks/sql/10_workflow/gates/gate_global_scope.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/10_workflow/gates/gate_global_scope.sql

        - task_key: source_table_existence_checks
          depends_on:
            - task_key: global_scope_gate
          description: >
            Source table existence via {{source_catalog}}.information_schema.tables
            (not system.information_schema). Manual fallback documented in 00_readme.md.
            SQL: databricks/sql/12_staging_readiness/01_source_table_existence_checks.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/12_staging_readiness/01_source_table_existence_checks.sql

        - task_key: required_column_checks
          depends_on:
            - task_key: source_table_existence_checks
          description: >
            Required-column contracts via catalog-scoped information_schema.columns.
            SQL: databricks/sql/12_staging_readiness/02_required_column_checks.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/12_staging_readiness/02_required_column_checks.sql

        - task_key: row_count_date_range_checks
          depends_on:
            - task_key: required_column_checks
          description: >
            Row-count/date-window readiness (RUN_MANUAL guidance; no full-table scan on
            bronze_pricelog_history_currencyprice). Catalog-scoped visibility only.
            SQL: databricks/sql/12_staging_readiness/03_row_count_date_range_checks.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/12_staging_readiness/03_row_count_date_range_checks.sql

    # -------------------------------------------------------------------------
    # Job 2 — Static references and UDF/readiness checks (after Job 1)
    # -------------------------------------------------------------------------
    mifid_staging_static_reference_job:
      name: mifid_staging_static_reference_job_do_not_deploy
      description: >
        Static references, UDF contracts, and structural validation checks.
        Run only after Job 1 readiness PASS or accepted TODO/SKIP/RUN_MANUAL evidence.
      max_concurrent_runs: 1
      tags:
        phase: staging_static_references
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "2"
        prerequisite_job: mifid_staging_readiness_job_do_not_deploy
        delivery_scope: excluded
        production_scope: excluded
      parameters: *staging_job_parameters
      tasks:
        - task_key: static_reference_compatibility
          description: >
            Static reference compatibility/view checks.
            SQL: databricks/sql/01_static_references/01_static_reference_compatibility.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/01_static_references/01_static_reference_compatibility.sql

        - task_key: static_reference_required_columns
          depends_on:
            - task_key: static_reference_compatibility
          description: >
            Required-column checks for static reference dependencies.
            SQL: databricks/sql/validation/02_static_reference_required_columns.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/validation/02_static_reference_required_columns.sql

        - task_key: static_reference_quality_checks
          depends_on:
            - task_key: static_reference_required_columns
          description: >
            Additional static-reference quality checks (row counts/null/duplicate checks).
            Primary SQL: databricks/sql/validation/03_static_reference_null_keys.sql
            Supporting: validation/01_*, 04_*, 05_*, 06_*, 07_*
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/validation/03_static_reference_null_keys.sql

        - task_key: udf_replacechar_contract
          depends_on:
            - task_key: static_reference_quality_checks
          description: >
            ReplaceChar UDF contract file (template reference; no production activation).
            SQL: databricks/sql/02_udfs/01_fn_replacechar.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/02_udfs/01_fn_replacechar.sql

        - task_key: udf_instrumentmetadata_conversion_deferred
          depends_on:
            - task_key: udf_replacechar_contract
          description: >
            Deferred instrument metadata special-char conversion template.
            SQL: databricks/sql/02_udfs/02_instrumentmetadata_specialchar_conversion_deferred.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/02_udfs/02_instrumentmetadata_specialchar_conversion_deferred.sql

    # -------------------------------------------------------------------------
    # Job 3 — Price/currency/split staging groups
    # -------------------------------------------------------------------------
    mifid_staging_price_currency_split_job:
      name: mifid_staging_price_currency_split_job_do_not_deploy
      description: >
        Structural checks for price/currency/split staging groups.
        TODO: keep one-to-one table-level SQL mapping comments updated as SSIS parity wiring is finalized.
      max_concurrent_runs: 1
      tags:
        phase: staging_price_currency_split
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "3"
        prerequisite_job: mifid_staging_static_reference_job_do_not_deploy
        delivery_scope: excluded
        production_scope: excluded
      parameters: *staging_job_parameters
      tasks:
        - task_key: reg_currencyprice_ext
          description: >
            Reg_CurrencyPrice_Ext structural validation.
            SQL: databricks/sql/03_pre_regulation_ext/03_price_currency_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/03_price_currency_validation.sql

        - task_key: reg_ext_currencypricemaxdatewithsplit
          depends_on:
            - task_key: reg_currencyprice_ext
          description: >
            Reg_Ext_CurrencyPriceMaxDateWithSplit structural validation.
            TODO: confirm per-table staging SQL sections in 02_price_currency_staging.sql before execution enablement.
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/03_price_currency_validation.sql

        - task_key: reg_ext_dailymaxprices
          depends_on:
            - task_key: reg_ext_currencypricemaxdatewithsplit
          description: >
            Reg_Ext_DailyMaxPrices structural validation.
            SQL: databricks/sql/03_pre_regulation_ext/03_price_currency_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/03_price_currency_validation.sql

        - task_key: reg_ext_t_pricecandle60min
          depends_on:
            - task_key: reg_ext_dailymaxprices
          description: >
            Reg_Ext_T_PriceCandle60Min structural validation.
            SQL: databricks/sql/03_pre_regulation_ext/03_price_currency_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/03_price_currency_validation.sql

        - task_key: reg_ext_historysplitratio
          depends_on:
            - task_key: reg_ext_t_pricecandle60min
          description: >
            Reg_Ext_HistorySplitRatio structural validation.
            SQL: databricks/sql/03_pre_regulation_ext/03_price_currency_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/03_price_currency_validation.sql

    # -------------------------------------------------------------------------
    # Job 4 — Non-price Reg_Ext staging groups
    # -------------------------------------------------------------------------
    mifid_staging_non_price_reg_ext_job:
      name: mifid_staging_non_price_reg_ext_job_do_not_deploy
      description: >
        Structural checks for non-price Reg_Ext staging groups and instrument SCD-readiness gates.
      max_concurrent_runs: 1
      tags:
        phase: staging_non_price_reg_ext
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "4"
        prerequisite_job: mifid_staging_price_currency_split_job_do_not_deploy
        delivery_scope: excluded
        production_scope: excluded
      parameters: *staging_job_parameters
      tasks:
        - task_key: reg_ext_trade_getinstrument
          description: >
            Reg_Ext_Trade_GetInstrument structural validation.
            SQL: databricks/sql/03_pre_regulation_ext/06_non_price_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/06_non_price_validation.sql

        - task_key: reg_ext_trade_instrumentmetadata
          depends_on:
            - task_key: reg_ext_trade_getinstrument
          description: >
            Reg_Ext_Trade_InstrumentMetaData structural validation.
            SQL: databricks/sql/03_pre_regulation_ext/06_non_price_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/06_non_price_validation.sql

        - task_key: reg_ext_dictionarycurrency
          depends_on:
            - task_key: reg_ext_trade_instrumentmetadata
          description: >
            Reg_Ext_DictionaryCurrency structural validation.
            SQL: databricks/sql/03_pre_regulation_ext/06_non_price_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/06_non_price_validation.sql

        - task_key: reg_ext_dictionarycurrencytype
          depends_on:
            - task_key: reg_ext_dictionarycurrency
          description: >
            Reg_Ext_DictionaryCurrencyType structural validation.
            SQL: databricks/sql/03_pre_regulation_ext/06_non_price_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/06_non_price_validation.sql

        - task_key: reg_instruments_ext_scd_structural_checks
          depends_on:
            - task_key: reg_ext_dictionarycurrencytype
          description: >
            Reg_Instruments_ext / instrument SCD structural gating checks.
            SQL: databricks/sql/03_pre_regulation_ext/05_non_price_staging_gates.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/03_pre_regulation_ext/05_non_price_staging_gates.sql

    # -------------------------------------------------------------------------
    # Job 5 — Regulation movement staging groups
    # -------------------------------------------------------------------------
    mifid_staging_regulation_movement_job:
      name: mifid_staging_regulation_movement_job_do_not_deploy
      description: >
        Structural checks for regulation movement snapshots and positions.
      max_concurrent_runs: 1
      tags:
        phase: staging_regulation_movement
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "5"
        prerequisite_job: mifid_staging_non_price_reg_ext_job_do_not_deploy
        delivery_scope: excluded
        production_scope: excluded
      parameters: *staging_job_parameters
      tasks:
        - task_key: reg_migrationinout_population_snapshot
          description: >
            Reg_MigrationInOut_Population snapshot structural validation.
            SQL: databricks/sql/04_regulation_movements/03_regulation_movments_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/04_regulation_movements/03_regulation_movments_validation.sql

        - task_key: reg_regulationinoutdailydata_snapshot
          depends_on:
            - task_key: reg_migrationinout_population_snapshot
          description: >
            Reg_RegulationInOutDailyData snapshot structural validation.
            SQL: databricks/sql/04_regulation_movements/03_regulation_movments_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/04_regulation_movements/03_regulation_movments_validation.sql

        - task_key: reg_regulation_movments_positions
          depends_on:
            - task_key: reg_regulationinoutdailydata_snapshot
          description: >
            Reg_Regulation_Movments_Positions structural validation.
            SQL: databricks/sql/04_regulation_movements/03_regulation_movments_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/04_regulation_movements/03_regulation_movments_validation.sql

    # -------------------------------------------------------------------------
    # Job 6 — Hedge/liquidity staging groups
    # -------------------------------------------------------------------------
    mifid_staging_hedge_liquidity_job:
      name: mifid_staging_hedge_liquidity_job_do_not_deploy
      description: >
        Structural checks for hedge/liquidity ext tables and Reg_LiquidtyAcount_SCD (structural only).
      max_concurrent_runs: 1
      tags:
        phase: staging_hedge_liquidity
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "6"
        prerequisite_job: mifid_staging_regulation_movement_job_do_not_deploy
        delivery_scope: excluded
        production_scope: excluded
      parameters: *staging_job_parameters
      tasks:
        - task_key: reg_hedgeservertoliquidityaccount_ext
          description: >
            Reg_HedgeServerToLiquidityAccount_Ext structural validation.
            SQL: databricks/sql/05_hedge_liquidity/04_hedge_liquidity_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/05_hedge_liquidity/04_hedge_liquidity_validation.sql

        - task_key: reg_liquidtyacount_ext
          depends_on:
            - task_key: reg_hedgeservertoliquidityaccount_ext
          description: >
            Reg_LiquidtyAcount_Ext structural validation.
            SQL: databricks/sql/05_hedge_liquidity/04_hedge_liquidity_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/05_hedge_liquidity/04_hedge_liquidity_validation.sql

        - task_key: reg_ext_liquidityaccountid
          depends_on:
            - task_key: reg_liquidtyacount_ext
          description: >
            Reg_Ext_LiquidityAccountID structural validation.
            SQL: databricks/sql/05_hedge_liquidity/04_hedge_liquidity_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/05_hedge_liquidity/04_hedge_liquidity_validation.sql

        - task_key: reg_ext_liquidityproviders
          depends_on:
            - task_key: reg_ext_liquidityaccountid
          description: >
            Reg_Ext_LiquidityProviders structural validation.
            SQL: databricks/sql/05_hedge_liquidity/04_hedge_liquidity_validation.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/05_hedge_liquidity/04_hedge_liquidity_validation.sql

        - task_key: reg_liquidtyacount_scd_structural_checks
          depends_on:
            - task_key: reg_ext_liquidityproviders
          description: >
            Reg_LiquidtyAcount_SCD structural checks only (full historical parity remains gated).
            SQL: databricks/sql/05_hedge_liquidity/03_reg_liquidtyacount_scd.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/05_hedge_liquidity/03_reg_liquidtyacount_scd.sql

    # -------------------------------------------------------------------------
    # Job 7 — ASIC2-compatible structural checks
    # -------------------------------------------------------------------------
    mifid_staging_asic2_structural_job:
      name: mifid_staging_asic2_structural_job_do_not_deploy
      description: >
        ASIC2-compatible subset structural checks only; no ETORO final parity claim.
      max_concurrent_runs: 1
      tags:
        phase: staging_asic2_structural
        state: template_only_execution_gated
        environment: regtech_ops_stg
        job_order: "7"
        prerequisite_job: mifid_staging_hedge_liquidity_job_do_not_deploy
