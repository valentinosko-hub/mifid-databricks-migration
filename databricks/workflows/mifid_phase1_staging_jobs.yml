          description: >
            MIFID2_ext_Mirror structural task group.
            SQL: databricks/sql/07_mifid2_ext/04_positionchangelog_mirror_ext_staging.sql
          sql_task:
            warehouse_id: ${var.sql_warehouse_id}
            file:
              path: ../sql/07_mifid2_ext/04_positionchangelog_mirror_ext_staging.sql

        - task_key: mifid2_ext_hedgeexecutionlog
          depends_on:
            - task_key: mifid2_ext_mirror
