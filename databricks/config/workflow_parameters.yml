# Shared workflow parameter defaults — staging smoke-test and Step 17B skeletons
# Template-only; not deployed. Referenced by workflow YAML and execution docs.
#
# Environment policy:
# - Read: main.regtech (DE-migrated sources) when available
# - Dev fallback: alternate confirmed source schemas documented in docs only
# - Write: main.regtech_ops_stg only; prefix bi_output_regtechops_
# - Never write main.regtech from RegTech staging jobs

staging_jobs:
  description: Canonical split staging workflow jobs (Jobs 1–11; template-only; do not deploy)
  workflow_file: databricks/workflows/mifid_phase1_staging_jobs.yml
  deploy: false
  schedule: null
  cross_job_dependency: manual_only  # no automatic Databricks trigger between jobs in skeleton
  execution_order:
    - job_key: mifid_staging_readiness_job
      job_name: mifid_staging_readiness_job_do_not_deploy
      required_first: true
    - job_key: mifid_staging_static_reference_job
      job_name: mifid_staging_static_reference_job_do_not_deploy
      prerequisite: mifid_staging_readiness_job_do_not_deploy
      note: run only after Job 1 PASS or accepted TODO/SKIP/RUN_MANUAL evidence
    - job_key: mifid_staging_price_currency_split_job
      job_name: mifid_staging_price_currency_split_job_do_not_deploy
      prerequisite: mifid_staging_static_reference_job_do_not_deploy
    - job_key: mifid_staging_non_price_reg_ext_job
      job_name: mifid_staging_non_price_reg_ext_job_do_not_deploy
      prerequisite: mifid_staging_price_currency_split_job_do_not_deploy
    - job_key: mifid_staging_regulation_movement_job
      job_name: mifid_staging_regulation_movement_job_do_not_deploy
      prerequisite: mifid_staging_non_price_reg_ext_job_do_not_deploy
    - job_key: mifid_staging_hedge_liquidity_job
      job_name: mifid_staging_hedge_liquidity_job_do_not_deploy
      prerequisite: mifid_staging_regulation_movement_job_do_not_deploy
    - job_key: mifid_staging_asic2_structural_job
      job_name: mifid_staging_asic2_structural_job_do_not_deploy
      prerequisite: mifid_staging_hedge_liquidity_job_do_not_deploy
    - job_key: mifid_staging_mifid2_ext_non_pii_job
      job_name: mifid_staging_mifid2_ext_non_pii_job_do_not_deploy
      prerequisite: mifid_staging_asic2_structural_job_do_not_deploy
    - job_key: mifid_staging_validation_summary_job
      job_name: mifid_staging_validation_summary_job_do_not_deploy
      prerequisite: mifid_staging_mifid2_ext_non_pii_job_do_not_deploy
    - job_key: mifid_staging_manual_seed_testing_job
      job_name: mifid_staging_manual_seed_testing_job_do_not_deploy
      optional: true
      enable_flag: enable_manual_seed_testing_checks
    - job_key: mifid_staging_hedge_recordid_registry_job
      job_name: mifid_staging_hedge_recordid_registry_job_do_not_deploy
      optional: true
  source_of_truth:
    repository: cursor_authored_yaml_and_docs
    drift_policy: copy_accepted_databricks_ui_or_genie_edits_back_to_repo_and_commit
  metadata_policy:
    use_catalog_scoped_information_schema: true
    forbidden: system.information_schema
    fallback: manual_inline_checks_with_external_evidence
  creation_plan: docs/staging_workflow_job_creation_plan.md

staging_smoke_test:
  description: Combined smoke-test workflow (backward reference; prefer staging_jobs)
  workflow_file: databricks/workflows/mifid_phase1_staging_smoke_test.yml
  job_key: mifid_phase1_staging_smoke_test_skeleton
  superseded_by: databricks/workflows/mifid_phase1_staging_jobs.yml
  schedule: null
  deploy: false
  default_critical_path:
    - source_readiness_checks
    - static_reference_checks
    - price_currency_split_ext_staging
    - non_price_reg_ext_staging
    - regulation_movement_staging
    - hedge_liquidity_ext_staging
    - asic2_structural_staging
    - mifid2_ext_non_pii_staging
    - validation_summary
  optional_task_groups:
    masked_customer_structural_tests:
      enable_flag: enable_masked_customer_structural_tests
      default: "false"
      also_requires:
        - allow_masked_customer_sources=true
        - MAG-05 CLOSED
      not_required_for_first_pass: true
    manual_seed_testing_checks:
      enable_flag: enable_manual_seed_testing_checks
      default: "false"
      also_requires:
        - seed tables loaded with manifest evidence
      not_required_for_first_pass: true
  parameters:
    source_catalog: main
    source_schema: regtech
    target_catalog: main
    target_schema: regtech_ops_stg
    # Compatibility aliases for gate SQL wrappers (target = write schema)
    catalog: main
    schema: regtech_ops_stg
    object_prefix: bi_output_regtechops_
    report_date: "YYYY-MM-DD"
    run_mode: development_structural_test
    dry_run: "true"
    staging_execution_approved: "false"
    allow_masked_customer_sources: "false"
    enable_masked_customer_structural_tests: "false"
    enable_manual_seed_testing_checks: "false"
    require_unmasked_pii_for_parity: "true"
    skip_delivery_steps: "true"
    enable_validation_only: "true"
    dev_customer_source_mode: masked_fallback
    customer_source_policy: temporary_masked_dev_only_v1

dry_run_policy:
  dry_run_true:
    mode: readiness_check_only
    gate_03: PASS
    default: true
    description: Safe default for template and first smoke-test pass
  dry_run_false:
    allowed_when:
      - staging_execution_approved=true
      - run_mode=development_structural_test
      - MAG-18 CLOSED
    gate_03: PASS_WITH_LIMITS
    writes: main.regtech_ops_stg only
    not_production: true

audit_evidence_mapping:
  gate_sql: databricks/sql/10_workflow/gates/gate_global_scope.sql
  audit_manifest_sql: databricks/sql/10_workflow/02_audit_logging.sql
  external_evidence_log: docs/staging_execution_evidence_log.md  # template; populate working copy outside Git
  readiness_sql_package: databricks/sql/12_staging_readiness/
  first_run_plan: docs/staging_first_run_plan.md
  baseline_manifests: secure storage outside repo

phase1_table_generation:
  description: Step 17B full table-generation ordering skeleton (separate workflow)
  workflow_file: databricks/workflows/mifid_phase1_table_generation.yml
  job_key: mifid_phase1_table_generation_skeleton
  schedule: null
  deploy: false
  parameters:
    catalog: main
    schema: regtech_ops_stg
    object_prefix: bi_output_regtechops_
    report_date: "YYYY-MM-DD"
    run_mode: development_structural_test
    dry_run: "true"
    staging_execution_approved: "false"
    allow_masked_customer_sources: "false"
    require_unmasked_pii_for_parity: "true"
    skip_delivery_steps: "true"
    enable_validation_only: "true"

source_read_policy:
  primary:
    catalog: main
    schema: regtech
    note: DE-migrated SQL Server / RegReportDB sources
  development_fallback:
    enabled: false
    note: >
      When a main.regtech object is not yet available, teams may read from an
      already-confirmed alternate schema for structural debugging only. Document
      the fallback in run evidence; do not treat as production authority.

write_policy:
  catalog: main
  schema: regtech_ops_stg
  object_prefix: bi_output_regtechops_
  seed_prefix: bi_output_regtechops_seed_
  forbidden_write_schemas:
    - main.regtech

gated_exclusions:
  - final MIFID2_NPD_TRAX flow
  - final MIFID2_Failed_TRAX flow (gated on NPD history)
  - final MIFID2_Hedge_Report activation
  - final PII customer parity (main.pii_data)
  - delivery upload response production deployment
  - production schedules
